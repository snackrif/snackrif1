<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snack Rif Cafeteria</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#efe2cf;
font-family:Arial,sans-serif;
text-align:center;
color:#2b1a12;
}

/* HEADER */

.header{
background:linear-gradient(to bottom,#120909,#2b1a12);
padding-bottom:30px;
border-bottom-left-radius:35px;
border-bottom-right-radius:35px;
box-shadow:0 5px 20px rgba(0,0,0,0.25);
}

.cover{
width:100%;
max-width:900px;
display:block;
margin:auto;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.logo{
width:180px;
margin-top:25px;
margin-bottom:10px;
}

.title{
font-size:42px;
font-weight:bold;
color:#fff;
}

.subtitle{
color:#d4b06a;
font-size:20px;
margin-top:5px;
}

.desc{
color:#ddd;
margin-top:10px;
font-size:16px;
}

/* BUTTONS */

.main-btn{
display:inline-block;
margin-top:25px;
padding:18px 45px;
background:#d40000;
color:white;
text-decoration:none;
border-radius:60px;
font-size:24px;
font-weight:bold;
box-shadow:0 0 20px rgba(212,0,0,0.5);
transition:0.3s;
}

.main-btn:hover{
background:#aa0000;
transform:scale(1.03);
}

/* MENU */

.section{
padding:30px 15px;
}

.section-title{
font-size:32px;
margin-bottom:25px;
color:#2b1a12;
}

.menu-img{
width:95%;
max-width:750px;
margin:18px auto;
display:block;
border-radius:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

/* CONTACT */

.contact-box{
background:#f7ead7;
width:92%;
max-width:750px;
margin:25px auto;
padding:25px;
border-radius:30px;
box-shadow:0 5px 15px rgba(0,0,0,0.10);
}

.contact-title{
font-size:28px;
margin-bottom:20px;
}

/* SOCIAL BUTTONS */

.social-btn{
display:block;
width:100%;
padding:18px;
margin:15px 0;
border-radius:18px;
text-decoration:none;
font-size:20px;
font-weight:bold;
color:white;
transition:0.3s;
}

.whatsapp{
background:#25D366;
}

.instagram{
background:#d62976;
}

.tiktok{
background:#111;
}

.maps{
background:#c0392b;
}

.social-btn:hover{
transform:scale(1.02);
opacity:0.92;
}

/* INFO */

.info{
margin-top:20px;
font-size:18px;
line-height:1.8;
}

/* FOOTER */

.footer{
margin-top:40px;
padding:25px;
background:#2b1a12;
color:#eee;
font-size:16px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<img src="cover.jpg" class="cover">

<img src="logo.png" class="logo">

<div class="title">SNACK RIF</div>

<div class="subtitle">
FAST FOOD • CAFETERIA
</div>

<div class="desc">
Halal • Fresh • Delicious
</div>

<a href="#menu" class="main-btn">
📋 VER MENÚ
</a>

</div>

<!-- MENU -->

<div class="section" id="menu">

<div class="section-title">
🍔 MENÚ
</div>

<img src="menu1.jpg" class="menu-img">
<img src="menu2.jpg" class="menu-img">
<img src="menu3.jpg" class="menu-img">
<img src="menu4.jpg" class="menu-img">
<img src="menu5.jpg" class="menu-img">
<img src="menu6.jpg" class="menu-img">

</div>

<!-- CONTACT -->

<div class="contact-box">

<div class="contact-title">
📲 CONTACTO
</div>

<a href="https://wa.me/34666290425" class="social-btn whatsapp">
🟢 Pedir por WhatsApp
</a>

<a href="https://instagram.com/cafeteria_saad7" class="social-btn instagram">
📸 Síguenos en Instagram
</a>

<a href="https://www.tiktok.com/@yassinrifland1" class="social-btn tiktok">
🎵 Ver TikTok
</a>

<a href="https://maps.app.goo.gl/SDaFA6cfvyLwsXZcA?g_st=ic" class="social-btn maps">
📍 Cómo llegar
</a>

<div class="info">

📍 Carrer de Francesc Manuel de los Herreros,<br>
Llevant, 07005 Palma,<br>
Illes Balears, Spain

<br><br>

📞 +34 666 29 04 25

</div>

</div>

<!-- FOOTER -->

<div class="footer">
© Snack Rif Cafeteria
</div>

</body>
</html>
